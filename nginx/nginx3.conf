user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {

    include       /etc/nginx/mime.types;
    default_type  text/html;

    upstream NDM-test.local {

    server app.local:8080 max_fails=1 fail_timeout=10s;

    server nginx-2.local:80 backup;  
    server nginx-1.local:80 backup; 
    
    }

    # массив разрешенных ip адресов. это адреса прокси серверов
    # адрес 172.18.0.1 является шлюзом и NAT-ом, но не прокси
    
    map $remote_addr $is_allowed {

        default 0;
        192.168.200.101 1;
        192.168.200.102 1;
        192.168.200.103 1;
    
    }

    server {
        listen       80;
        listen  [::]:80;
        server_name nginx-3.local;
     
        location / {

            #если запрос пришел от клиента, то очищаем x-forwarded-for
            
            if ($is_allowed = 0) {

                set $custom_proxy_add_x_forwarded_for $remote_addr;
            
            }

            #если от разрешенного айпи, то дополняем x-forwarded-for

            if ($is_allowed = 1) {

                set $custom_proxy_add_x_forwarded_for $proxy_add_x_forwarded_for;
            
            }

            proxy_set_header X-Forwarded-For $custom_proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            
            proxy_pass http://NDM-test.local;

            proxy_connect_timeout 3s;
        }

    }

}